<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">VEIC Workspace Containers</title>
  <desc id="desc">C4 level 2 container diagram showing desktop app containers, server containers, database and resources.</desc>
  <style>
    .bg { fill: #050505; }
    .boundary { fill: none; stroke: #f2f2f2; stroke-opacity: .28; stroke-width: 1.3; rx: 14; stroke-dasharray: 8 8; }
    .box { fill: #111; stroke: #f2f2f2; stroke-opacity: .52; stroke-width: 1.2; rx: 8; }
    .db { fill: #101010; stroke: #f2f2f2; stroke-opacity: .56; stroke-width: 1.2; }
    .ext { fill: #0c0c0c; stroke: #f2f2f2; stroke-opacity: .34; stroke-width: 1.2; rx: 8; }
    .title { fill: #fff; font: 700 22px "JetBrains Mono", Consolas, monospace; }
    .h { fill: #fff; font: 700 14px "JetBrains Mono", Consolas, monospace; }
    .p { fill: #bdbdbd; font: 12px "JetBrains Mono", Consolas, monospace; }
    .small { fill: #8c8c8c; font: 11px "JetBrains Mono", Consolas, monospace; }
    .line { stroke: #f2f2f2; stroke-opacity: .43; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#f2f2f2" fill-opacity=".58" />
    </marker>
  </defs>
  <rect class="bg" width="1280" height="760" />
  <text x="48" y="58" class="title">C4 L2 - Containers</text>
  <text x="48" y="84" class="p">Desktop owns shell/cache. Server owns truth. Resources remain external participants.</text>

  <rect x="52" y="130" width="528" height="470" class="boundary" />
  <text x="80" y="166" class="h">VEIC Desktop Workspace</text>
  <rect x="92" y="212" width="200" height="90" class="box" />
  <text x="126" y="247" class="h">Workspace UI</text>
  <text x="112" y="272" class="p">React + TypeScript</text>
  <rect x="340" y="212" width="200" height="90" class="box" />
  <text x="384" y="247" class="h">Tauri Shell</text>
  <text x="386" y="272" class="p">Rust commands</text>
  <ellipse cx="192" cy="426" rx="100" ry="46" class="db" />
  <text x="140" y="418" class="h">Local Cache</text>
  <text x="152" y="444" class="p">SQLite</text>
  <ellipse cx="440" cy="426" rx="100" ry="46" class="db" />
  <text x="384" y="418" class="h">OS Keychain</text>
  <text x="392" y="444" class="p">token material</text>

  <rect x="700" y="130" width="528" height="470" class="boundary" />
  <text x="728" y="166" class="h">VEIC Portal API v2</text>
  <rect x="740" y="212" width="200" height="90" class="box" />
  <text x="792" y="247" class="h">API Server</text>
  <text x="774" y="272" class="p">Rust Axum</text>
  <rect x="988" y="212" width="200" height="90" class="box" />
  <text x="1025" y="247" class="h">Controllers</text>
  <text x="1008" y="272" class="p">maintenance, runtime</text>
  <ellipse cx="964" cy="426" rx="120" ry="48" class="db" />
  <text x="906" y="418" class="h">Postgres</text>
  <text x="880" y="444" class="p">authoritative state</text>

  <rect x="478" y="650" width="324" height="72" class="ext" />
  <text x="558" y="680" class="h">Physical and Service Resources</text>
  <text x="518" y="704" class="p">Robots, cameras, PLCs, MCP, device services</text>

  <path class="line" d="M292 257 L340 257" />
  <text x="302" y="245" class="small">commands</text>
  <path class="line" d="M440 302 L440 380" />
  <path class="line" d="M340 426 L292 426" />
  <path class="line" d="M540 257 L740 257" />
  <text x="612" y="245" class="small">REST + events</text>
  <path class="line" d="M840 302 C858 342 900 370 940 382" />
  <path class="line" d="M1088 302 C1070 342 1030 370 988 382" />
  <path class="line" d="M840 302 C760 470 710 570 660 650" />
  <path class="line" d="M1088 302 C1010 470 810 570 720 650" />
</svg>
