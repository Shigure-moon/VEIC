<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="780" viewBox="0 0 1280 780" role="img" aria-labelledby="title desc">
  <title id="title">VEIC Desktop Components</title>
  <desc id="desc">C4 level 3 desktop component diagram for React and Tauri components.</desc>
  <style>
    .bg { fill: #050505; }
    .boundary { fill: none; stroke: #f2f2f2; stroke-opacity: .28; stroke-width: 1.3; rx: 14; stroke-dasharray: 8 8; }
    .box { fill: #111; stroke: #f2f2f2; stroke-opacity: .5; stroke-width: 1.2; rx: 8; }
    .store { fill: #101010; stroke: #f2f2f2; stroke-opacity: .56; stroke-width: 1.2; rx: 8; }
    .title { fill: #fff; font: 700 22px "JetBrains Mono", Consolas, monospace; }
    .h { fill: #fff; font: 700 13px "JetBrains Mono", Consolas, monospace; }
    .p { fill: #bdbdbd; font: 11px "JetBrains Mono", Consolas, monospace; }
    .small { fill: #8c8c8c; font: 10px "JetBrains Mono", Consolas, monospace; }
    .line { stroke: #f2f2f2; stroke-opacity: .42; stroke-width: 1.1; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#f2f2f2" fill-opacity=".58" />
    </marker>
  </defs>
  <rect class="bg" width="1280" height="780" />
  <text x="48" y="58" class="title">C4 L3 - Desktop Components</text>
  <text x="48" y="84" class="p">The app is an operating surface: overview, explorer, timeline and command intent creation.</text>

  <rect x="52" y="120" width="866" height="580" class="boundary" />
  <text x="80" y="156" class="h">Tauri Desktop App</text>

  <rect x="92" y="200" width="180" height="76" class="box" />
  <text x="142" y="232" class="h">App Shell</text>
  <text x="116" y="254" class="p">navigation, status</text>

  <rect x="320" y="200" width="180" height="76" class="box" />
  <text x="344" y="232" class="h">Workspace Overview</text>
  <text x="344" y="254" class="p">presence and counts</text>

  <rect x="548" y="200" width="180" height="76" class="box" />
  <text x="578" y="232" class="h">Resource Explorer</text>
  <text x="584" y="254" class="p">objects and details</text>

  <rect x="92" y="324" width="180" height="76" class="box" />
  <text x="130" y="356" class="h">Timeline</text>
  <text x="118" y="378" class="p">flight recorder</text>

  <rect x="320" y="324" width="180" height="76" class="box" />
  <text x="344" y="356" class="h">Workspace Search</text>
  <text x="350" y="378" class="p">source-linked answers</text>

  <rect x="548" y="324" width="180" height="76" class="box" />
  <text x="574" y="356" class="h">Command Palette</text>
  <text x="582" y="378" class="p">auditable intents</text>

  <rect x="92" y="448" width="180" height="76" class="box" />
  <text x="126" y="480" class="h">Simulation View</text>
  <text x="122" y="502" class="p">prediction boundary</text>

  <rect x="320" y="448" width="180" height="76" class="store" />
  <text x="350" y="480" class="h">Workspace Store</text>
  <text x="342" y="502" class="p">local projections</text>

  <rect x="548" y="448" width="180" height="76" class="store" />
  <text x="590" y="480" class="h">API Client</text>
  <text x="578" y="502" class="p">REST, wait, cursor</text>

  <rect x="320" y="572" width="180" height="76" class="store" />
  <text x="362" y="604" class="h">Native Bridge</text>
  <text x="358" y="626" class="p">SQLite, keychain</text>

  <rect x="980" y="214" width="220" height="86" class="store" />
  <text x="1046" y="248" class="h">SQLite</text>
  <text x="1016" y="272" class="p">cache, cursor, logs</text>
  <rect x="980" y="430" width="220" height="86" class="store" />
  <text x="1032" y="464" class="h">Portal API v2</text>
  <text x="1018" y="488" class="p">server-owned truth</text>

  <path class="line" d="M272 238 L320 238" />
  <path class="line" d="M272 238 C292 318 300 354 320 362" />
  <path class="line" d="M500 486 L548 486" />
  <path class="line" d="M638 448 C642 414 642 400 638 400" />
  <path class="line" d="M410 524 L410 572" />
  <path class="line" d="M500 610 C670 610 782 264 980 257" />
  <path class="line" d="M728 486 C828 486 870 476 980 473" />
  <path class="line" d="M500 486 C530 470 536 470 548 486" />
  <path class="line" d="M500 238 L548 238" />
  <path class="line" d="M272 362 L320 362" />
  <path class="line" d="M500 362 L548 362" />
</svg>
