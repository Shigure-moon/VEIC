<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="740" viewBox="0 0 1280 740" role="img" aria-labelledby="title desc">
  <title id="title">VEIC Workspace Deployment</title>
  <desc id="desc">C4 deployment diagram for desktop app, API environment and physical world resources.</desc>
  <style>
    .bg { fill: #050505; }
    .node { fill: none; stroke: #f2f2f2; stroke-opacity: .28; stroke-width: 1.3; rx: 14; stroke-dasharray: 8 8; }
    .box { fill: #111; stroke: #f2f2f2; stroke-opacity: .52; stroke-width: 1.2; rx: 8; }
    .db { fill: #101010; stroke: #f2f2f2; stroke-opacity: .56; stroke-width: 1.2; }
    .title { fill: #fff; font: 700 22px "JetBrains Mono", Consolas, monospace; }
    .h { fill: #fff; font: 700 14px "JetBrains Mono", Consolas, monospace; }
    .p { fill: #bdbdbd; font: 12px "JetBrains Mono", Consolas, monospace; }
    .small { fill: #8c8c8c; font: 11px "JetBrains Mono", Consolas, monospace; }
    .line { stroke: #f2f2f2; stroke-opacity: .43; stroke-width: 1.2; fill: none; marker-end: url(#arrow); }
  </style>
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#f2f2f2" fill-opacity=".58" />
    </marker>
  </defs>
  <rect class="bg" width="1280" height="740" />
  <text x="48" y="58" class="title">C4 - Deployment View</text>
  <text x="48" y="84" class="p">Current desktop experiment targets Windows first; server truth lives in the API environment.</text>

  <rect x="56" y="138" width="330" height="450" class="node" />
  <text x="86" y="174" class="h">User Machine</text>
  <text x="86" y="196" class="small">Windows / macOS / Linux</text>
  <rect x="98" y="244" width="246" height="82" class="box" />
  <text x="128" y="278" class="h">VEIC Desktop Workspace</text>
  <text x="154" y="302" class="p">Tauri + React</text>
  <ellipse cx="221" cy="418" rx="118" ry="46" class="db" />
  <text x="168" y="410" class="h">Local SQLite</text>
  <text x="160" y="436" class="p">non-authoritative cache</text>
  <rect x="98" y="498" width="246" height="58" class="box" />
  <text x="156" y="532" class="h">OS Keychain</text>

  <rect x="476" y="138" width="330" height="450" class="node" />
  <text x="506" y="174" class="h">VEIC API Environment</text>
  <text x="506" y="196" class="small">ECS or equivalent</text>
  <rect x="518" y="260" width="246" height="82" class="box" />
  <text x="560" y="294" class="h">Portal API v2</text>
  <text x="572" y="318" class="p">Rust Axum</text>
  <ellipse cx="641" cy="446" rx="118" ry="46" class="db" />
  <text x="596" y="438" class="h">Postgres</text>
  <text x="572" y="464" class="p">authoritative state</text>

  <rect x="896" y="138" width="330" height="450" class="node" />
  <text x="926" y="174" class="h">Physical World</text>
  <text x="926" y="196" class="small">LAN / IPv6 / Overlay / Relay</text>
  <rect x="938" y="244" width="246" height="82" class="box" />
  <text x="992" y="278" class="h">Robots and Devices</text>
  <text x="984" y="302" class="p">resource adapters</text>
  <rect x="938" y="414" width="246" height="82" class="box" />
  <text x="964" y="448" class="h">MCP / A2A / ROS2</text>
  <text x="986" y="472" class="p">capability providers</text>

  <path class="line" d="M344 285 L518 300" />
  <text x="406" y="274" class="small">HTTPS + events</text>
  <path class="line" d="M221 326 L221 372" />
  <path class="line" d="M221 464 L221 498" />
  <path class="line" d="M641 342 L641 400" />
  <path class="line" d="M764 300 L938 285" />
  <text x="826" y="274" class="small">plan, invoke, observe</text>
  <path class="line" d="M764 316 C838 354 860 430 938 456" />
</svg>
